<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="50%" style="stop-color:#CCC"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Door handle - stainless steel look -->
  <rect x="310" y="240" width="180" height="32" rx="16" fill="url(#steel)" opacity="0.75"/>
  <rect x="316" y="246" width="168" height="20" rx="10" fill="#EFEFEF" opacity="0.25"/>
  <!-- Door panel suggestion -->
  <rect x="220" y="60" width="360" height="500" rx="4" fill="none" stroke="#333" stroke-width="3" opacity="0.5"/>
  <rect x="240" y="80" width="320" height="220" rx="2" fill="none" stroke="#2A2A2A" stroke-width="2" opacity="0.4"/>
  <rect x="240" y="320" width="320" height="220" rx="2" fill="none" stroke="#2A2A2A" stroke-width="2" opacity="0.4"/>
  <!-- Raptor claw reaching -->
  <path d="M 620 100 Q 580 180 520 220 Q 480 245 470 260" fill="none" stroke="#4A7C59" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M 600 80 Q 565 170 508 218 Q 472 242 466 258" fill="none" stroke="#4A7C59" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M 580 95 Q 550 175 500 222 Q 468 246 462 262" fill="none" stroke="#4A7C59" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Tension vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0.7"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#vignette)"/>
  <!-- Label -->
  <rect x="60" y="460" width="680" height="110" rx="8" fill="rgba(0,0,0,0.75)"/>
  <text x="400" y="500" font-family="Georgia, serif" font-size="16" fill="#D4A017" text-anchor="middle" font-weight="bold" letter-spacing="2">REPLACE WITH: raptor-door.jpg</text>
  <text x="400" y="528" font-family="Georgia, serif" font-size="11.5" fill="#8B7D6B" text-anchor="middle" font-style="italic">"Velociraptor claw reaching for a stainless steel door handle,</text>
  <text x="400" y="548" font-family="Georgia, serif" font-size="11.5" fill="#8B7D6B" text-anchor="middle" font-style="italic">dramatic close-up, cinematic Jurassic Park style, dark kitchen background"</text>
</svg>
